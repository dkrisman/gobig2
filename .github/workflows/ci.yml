# Correctness CI: runs on every push to main and every pull
# request. Mirrors `task ci` locally, minus `test:scripts`
# (currently unimplemented). Action and tool pins follow
# RULES.md - bump per the latest-stable check.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + vet + modverify
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: go mod verify
        # Supply-chain check: confirms go.sum matches downloaded
        # module zips. Cheap; runs first so an integrity break
        # fails the job before any compile work.
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: go test
        # Default ./... covers the public-API contract tests,
        # SerenityOS corpus runner (always-on; ships with the
        # repo), pathological-input regressions, and fuzz seeds.
        run: go test ./...

  test-race:
    name: test -race
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # The race detector requires cgo. Default-on in
      # ubuntu-24.04 runners, set explicitly for resilience.
      CGO_ENABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: go test -race
        run: go test -race ./...

  lint:
    name: lint + fmt:check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Install golangci-lint
        # Pinned to the same version `task tools` installs, so
        # CI and local agree byte-for-byte. Bump in Taskfile.yml
        # and here together.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1

      - name: golangci-lint run
        run: golangci-lint run

      - name: golangci-lint fmt --diff
        # Non-destructive formatter check: exits non-zero if any
        # file would be rewritten by `task fmt`.
        run: golangci-lint fmt --diff

  vuln:
    name: govulncheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck
        run: govulncheck ./...
